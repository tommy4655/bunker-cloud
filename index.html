<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA CENTRAL J.A.R.V.I.S.</title>
    <style>
        :root {
            --neon-blue: #00e5ff;
            --neon-green: #00ff66;
            --dark-bg: #03080e;
            --panel-bg: rgba(6, 18, 30, 0.75);
            --border-glow: rgba(0, 229, 255, 0.2);
        }

        body {
            background-color: var(--dark-bg);
            background-image: 
                radial-gradient(at 50% 0%, rgba(0, 229, 255, 0.15) 0px, transparent 50%),
                linear-gradient(rgba(18, 24, 38, 0.4) 1px, transparent 1px),
                linear-gradient(90deg, rgba(18, 24, 38, 0.4) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
            color: #e0f7fc;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }

        #header {
            text-align: center;
            padding: 10px;
            background: var(--panel-bg);
            border: 1px solid rgba(0, 229, 255, 0.3);
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 3px;
            color: var(--neon-blue);
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
            box-shadow: inset 0 0 15px rgba(0, 229, 255, 0.1);
            margin-bottom: 15px;
        }

        #pantalla-chat {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 15px;
            padding-bottom: 20px;
        }

        /* Ocultar barra de scroll pero mantener funcionalidad */
        #pantalla-chat::-webkit-scrollbar {
            width: 4px;
        }
        #pantalla-chat::-webkit-scrollbar-thumb {
            background: var(--neon-blue);
            border-radius: 2px;
        }

        .burbuja {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.4;
            position: relative;
            animation: aparecer 0.3s ease-out forwards;
        }

        .jarvis-msg {
            align-self: flex-start;
            background: var(--panel-bg);
            border: 1px solid rgba(0, 229, 255, 0.4);
            border-left: 4px solid var(--neon-blue);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3), 0 0 10px var(--border-glow);
            color: #d1f4ff;
        }

        .jarvis-msg::before {
            content: "J.A.R.V.I.S.";
            display: block;
            font-size: 10px;
            font-weight: bold;
            color: var(--neon-blue);
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .usuario-msg {
            align-self: flex-end;
            background: rgba(0, 255, 102, 0.08);
            border: 1px solid rgba(0, 255, 102, 0.4);
            border-right: 4px solid var(--neon-green);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            color: #e6fff0;
        }

        .usuario-msg::before {
            content: "SENTINEL";
            display: block;
            font-size: 10px;
            font-weight: bold;
            color: var(--neon-green);
            letter-spacing: 1px;
            margin-bottom: 4px;
            text-align: right;
        }

        #panel-control {
            display: flex;
            gap: 10px;
            background: rgba(4, 12, 22, 0.9);
            padding: 10px;
            border-radius: 12px;
            border: 1px solid rgba(0, 229, 255, 0.2);
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.5);
        }

        #btn-micro {
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            width: 50px;
            height: 50px;
            border-radius: 10px;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        #btn-micro.grabando {
            background: rgba(255, 0, 85, 0.2);
            border-color: #ff0055;
            color: #ff0055;
            animation: pulso-holograma 1.2s infinite;
        }

        #entrada {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 229, 255, 0.3);
            color: #ffffff;
            padding: 0 15px;
            height: 50px;
            font-size: 15px;
            border-radius: 10px;
            outline: none;
            transition: all 0.3s;
        }

        #entrada:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
        }

        #btn-ejecutar {
            background: var(--neon-blue);
            color: #03080e;
            border: none;
            padding: 0 20px;
            height: 50px;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
        }

        #btn-ejecutar:active {
            transform: scale(0.97);
        }

        @keyframes aparecer {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulso-holograma {
            0% { box-shadow: 0 0 0 0 rgba(255, 0, 85, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 0, 85, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 0, 85, 0); }
        }
    </style>
</head>
<body>

    <div id="header">⚡ ARCHIVADO DE PROTOCOLO // INTEGRIDAD: 100%</div>
    
    <div id="pantalla-chat">
        <div class="burbuja jarvis-msg">Sistemas principales vinculados a la red cuántica de manera exitosa, Señor Sentinel. Monitoreando base de datos activa.</div>
    </div>

    <div id="panel-control">
        <button id="btn-micro" onclick="alternarMicrofono()">🎙️</button>
        <input type="text" id="entrada" placeholder="Transmitir comando de voz o texto..." onkeypress="detectarEnter(event)">
        <button id="btn-ejecutar" onclick="procesarOrden()">ENVIAR</button>
    </div>

    <script>
        const pantallaChat = document.getElementById('pantalla-chat');
        const entrada = document.getElementById('entrada');
        const btnMicro = document.getElementById('btn-micro');
        let reconocimiento;
        let grabando = false;

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            reconocimiento = new SpeechRecognition();
            reconocimiento.lang = 'es-ES';
            reconocimiento.continuous = false;
            reconocimiento.interimResults = false;

            reconocimiento.onstart = () => {
                grabando = true;
                btnMicro.classList.add('grabando');
                entrada.placeholder = "Escuchando frecuencia, Señor...";
            };

            reconocimiento.onend = () => {
                grabando = false;
                btnMicro.classList.remove('grabando');
                entrada.placeholder = "Transmitir comando de voz o texto...";
            };

            reconocimiento.onresult = (event) => {
                const textoDetectado = event.results[0][0].transcript;
                entrada.value = textoDetectado;
                procesarOrden();
            };

            reconocimiento.onerror = () => {
                grabando = false;
                btnMicro.classList.remove('grabando');
            };
        } else {
            btnMicro.style.display = 'none';
        }

        function alternarMicrofono() {
            if (!reconocimiento) return;
            if (grabando) {
                reconocimiento.stop();
            } else {
                reconocimiento.start();
            }
        }

        function detectarEnter(event) {
            if (event.key === 'Enter') {
                procesarOrden();
            }
        }

        function hablar(texto) {
            if ('speechSynthesis' in window) {
                const mensajeVoz = new SpeechSynthesisUtterance(texto);
                mensajeVoz.lang = 'es-ES';
                
                const voces = window.speechSynthesis.getVoices();
                const vozMasculina = voces.find(v => v.lang.includes('es') && (v.name.toLowerCase().includes('male') || v.name.toLowerCase().includes('google')));
                if (vozMasculina) mensajeVoz.voice = vozMasculina;

                window.speechSynthesis.speak(mensajeVoz);
            }
        }

        // Efecto visual de escritura holográfica en tiempo real
        function efectoEscritura(elemento, texto) {
            let i = 0;
            elemento.innerHTML = ""; 
            function escribir() {
                if (i < texto.length) {
                    elemento.innerHTML += texto.charAt(i);
                    i++;
                    pantallaChat.scrollTop = pantallaChat.scrollHeight;
                    setTimeout(escribir, 15); // Velocidad de escritura en ms
                }
            }
            escribir();
        }

        async function procesarOrden() {
            const texto = entrada.value.trim();
            if (!texto) return;

            imprimirPantalla(texto, 'usuario-msg');
            entrada.value = '';

            try {
                const respuesta = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: texto })
                });

                const datos = await respuesta.json();

                if (datos.reply) {
                    imprimirPantalla(datos.reply, 'jarvis-msg', true);
                    hablar(datos.reply);
                } else {
                    imprimirPantalla("Advertencia: Se detectó una respuesta corrupta en el núcleo.", 'jarvis-msg');
                }

            } catch (error) {
                imprimirPantalla("Error de enlace crítico. Red de comunicación fuera de línea.", 'jarvis-msg');
            }
        }

        function imprimirPantalla(mensaje, clase, conEfecto = false) {
            const nuevaBurbuja = document.createElement('div');
            nuevaBurbuja.className = `burbuja ${clase}`;
            pantallaChat.appendChild(nuevaBurbuja);
            
            if (conEfecto) {
                efectoEscritura(nuevaBurbuja, mensaje);
            } else {
                nuevaBurbuja.textContent = mensaje;
            }
            
            pantallaChat.scrollTop = pantallaChat.scrollHeight;
        }

        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = () => {};
        }
    </script>
</body>
    </html>
