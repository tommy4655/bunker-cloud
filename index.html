<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROYECTO J.A.R.V.I.S.</title>
    <style>
        body {
            background-color: #050505;
            color: #00ff66;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }
        #header {
            text-align: center;
            border-bottom: 1px solid #003311;
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            letter-spacing: 2px;
        }
        #terminal {
            flex: 1;
            overflow-y: auto;
            border: 1px solid #003311;
            padding: 15px;
            background-color: #000000;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 16px;
            line-height: 1.5;
        }
        .linea {
            margin-bottom: 12px;
            white-space: pre-wrap;
        }
        #controles {
            display: flex;
            gap: 10px;
            padding-bottom: 10px;
        }
        #btn-micro {
            background-color: #1a1a2e;
            border: 1px solid #00ff66;
            color: #00ff66;
            padding: 15px;
            border-radius: 5px;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 55px;
        }
        #btn-micro.grabando {
            background-color: #ff0055;
            color: #ffffff;
            border-color: #ff0055;
            animation: pulso 1.5s infinite;
        }
        #entrada {
            flex: 1;
            background-color: #000000;
            border: 1px solid #003311;
            color: #00ff66;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            border-radius: 5px;
            outline: none;
        }
        #entrada:focus {
            border-color: #00ff66;
        }
        #btn-enviar {
            background-color: #00ff66;
            color: #000000;
            border: none;
            padding: 0 25px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
        }
        #btn-enviar:active {
            background-color: #00cc52;
        }
        @keyframes pulso {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="header">🤖 PROYECTO J.A.R.V.I.S. // CONTROL CENTRAL</div>
    
    <div id="terminal">
        <div class="linea">[JARVIS]: Todos los sistemas principales se encuentran operativos, Señor. ¿En qué puedo colaborar con sus proyectos hoy?</div>
    </div>

    <div id="controles">
        <button id="btn-micro" onclick="alternarMicrofono()">🎤</button>
        <input type="text" id="entrada" placeholder="Escriba una orden o use el micrófono..." onkeypress="detectarEnter(event)">
        <button id="btn-enviar" onclick="procesarOrden()">RUN</button>
    </div>

    <script>
        const terminal = document.getElementById('terminal');
        const entrada = document.getElementById('entrada');
        const btnMicro = document.getElementById('btn-micro');
        let reconocimiento;
        let grabando = false;

        // Configuración del Reconocimiento de Voz nativo para Android
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            reconocimiento = new SpeechRecognition();
            reconocimiento.lang = 'es-ES';
            reconocimiento.continuous = false;
            reconocimiento.interimResults = false;

            reconocimiento.onstart = () => {
                grabando = true;
                btnMicro.classList.add('grabando');
                entrada.placeholder = "Escuchando, Señor...";
            };

            reconocimiento.onend = () => {
                grabando = false;
                btnMicro.classList.remove('grabando');
                entrada.placeholder = "Escriba una orden o use el micrófono...";
            };

            reconocimiento.onresult = (event) => {
                const textoDetectado = event.results[0][0].transcript;
                entrada.value = textoDetectado;
                procesarOrden(); // Envía automáticamente al terminar de hablar
            };

            reconocimiento.onerror = (event) => {
                console.error("Error del micro:", event.error);
                grabando = false;
                btnMicro.classList.remove('grabando');
            };
        } else {
            btnMicro.style.display = 'none'; // Oculta si el navegador no lo soporta
        }

        function alternarMicrofono() {
            if (!reconocimiento) return;
            if (grabando) {
                reconocimiento.stop();
            } else {
                reconocimiento.start();
            }
        }

        function detectarEnter(event) {
            if (event.key === 'Enter') {
                procesarOrden();
            }
        }

        // Sistema de Voz Text-to-Speech integrado (Fase Celular)
        function hablar(texto) {
            if ('speechSynthesis' in window) {
                // Limpiamos etiquetas de sistema si las hay
                const textoLimpio = texto.replace(/\[JARVIS\]:/g, '').trim();
                const mensajeVoz = new SpeechSynthesisUtterance(textoLimpio);
                mensajeVoz.lang = 'es-ES';
                
                // Intenta forzar una voz masculina si está disponible en Android
                const voces = window.speechSynthesis.getVoices();
                const vozMasculina = voces.find(v => v.lang.includes('es') && (v.name.toLowerCase().includes('male') || v.name.toLowerCase().includes('google')));
                if (vozMasculina) mensajeVoz.voice = vozMasculina;

                window.speechSynthesis.speak(mensajeVoz);
            }
        }

        async function procesarOrden() {
            const texto = entrada.value.trim();
            if (!texto) return;

            // Imprimir lo que dijo el usuario en pantalla
            imprimirPantalla("[USUARIO]: " + texto);
            entrada.value = '';

            try {
                // PUENTE DE DATOS: Formateado exactamente para recibir la memoria en Vercel
                const respuesta = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message: texto })
                });

                const datos = await respuesta.json();

                if (datos.reply) {
                    imprimirPantalla("[JARVIS]: " + datos.reply);
                    hablar(datos.reply);
                } else {
                    imprimirPantalla("[SISTEMA]: Error en la respuesta del procesador central.");
                }

            } catch (error) {
                console.error(error);
                imprimirPantalla("[SISTEMA]: Interrupción de enlace. Verifique los servidores en Vercel.");
            }
        }

        function imprimirPantalla(mensaje) {
            const nuevaLinea = document.createElement('div');
            nuevaLinea.className = 'linea';
            nuevaLinea.textContent = mensaje;
            terminal.appendChild(nuevaLinea);
            terminal.scrollTop = terminal.scrollHeight; // Auto-scroll al fondo
        }

        // Asegura que las voces carguen correctamente en navegadores basados en Chromium/Android
        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = () => {};
        }
    </script>
</body>
</html>
