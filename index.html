<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA CENTRAL J.A.R.V.I.S.</title>
    <style>
        :root {
            --neon-blue: #00e5ff;
            --neon-green: #00ff66;
            --dark-bg: #03080e;
            --panel-bg: rgba(6, 18, 30, 0.75);
            --border-glow: rgba(0, 229, 255, 0.2);
        }

        body {
            background-color: var(--dark-bg);
            background-image: 
                radial-gradient(at 50% 0%, rgba(0, 229, 255, 0.15) 0px, transparent 50%),
                linear-gradient(rgba(18, 24, 38, 0.4) 1px, transparent 1px),
                linear-gradient(90deg, rgba(18, 24, 38, 0.4) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
            color: #e0f7fc;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }

        #header {
            text-align: center;
            padding: 10px;
            background: var(--panel-bg);
            border: 1px solid rgba(0, 229, 255, 0.3);
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 3px;
            color: var(--neon-blue);
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
            margin-bottom: 15px;
        }

        #pantalla-chat {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 15px;
        }

        #pantalla-chat::-webkit-scrollbar { width: 4px; }
        #pantalla-chat::-webkit-scrollbar-thumb { background: var(--neon-blue); border-radius: 2px; }

        .burbuja {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.4;
            animation: aparecer 0.3s ease-out forwards;
        }

        .jarvis-msg {
            align-self: flex-start;
            background: var(--panel-bg);
            border: 1px solid rgba(0, 229, 255, 0.4);
            border-left: 4px solid var(--neon-blue);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3), 0 0 10px var(--border-glow);
            color: #d1f4ff;
        }

        .jarvis-msg::before {
            content: "J.A.R.V.I.S.";
            display: block;
            font-size: 10px;
            font-weight: bold;
            color: var(--neon-blue);
            margin-bottom: 4px;
        }

        .usuario-msg {
            align-self: flex-end;
            background: rgba(0, 255, 102, 0.08);
            border: 1px solid rgba(0, 255, 102, 0.4);
            border-right: 4px solid var(--neon-green);
            color: #e6fff0;
        }

        .usuario-msg::before {
            content: "SENTINEL";
            display: block;
            font-size: 10px;
            font-weight: bold;
            color: var(--neon-green);
            margin-bottom: 4px;
            text-align: right;
        }

        #panel-control {
            display: flex;
            gap: 8px;
            background: rgba(4, 12, 22, 0.9);
            padding: 10px;
            border-radius: 12px;
            border: 1px solid rgba(0, 229, 255, 0.2);
        }

        .btn-accion {
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            width: 48px;
            height: 48px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        #btn-micro.grabando {
            background: rgba(255, 0, 85, 0.2);
            border-color: #ff0055;
            color: #ff0055;
        }

        #entrada {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 229, 255, 0.3);
            color: #ffffff;
            padding: 0 12px;
            height: 48px;
            font-size: 15px;
            border-radius: 10px;
            outline: none;
        }

        #btn-ejecutar {
            background: var(--neon-blue);
            color: #03080e;
            border: none;
            padding: 0 15px;
            height: 48px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.3);
        }

        @keyframes aparecer { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="header">⚡ ARCHIVADO DE PROTOCOLO // INTEGRIDAD: 100%</div>
    
    <div id="pantalla-chat">
        <div class="burbuja jarvis-msg">Sistemas principales vinculados a la red de manera exitosa, Señor Sentinel. Monitoreando base de datos activa.</div>
    </div>

    <div id="panel-control">
        <button id="btn-micro" class="btn-accion" onclick="alternarMicrofono()">🎙️</button>
        <input type="text" id="entrada" placeholder="Transmitir comando..." onkeypress="detectarEnter(event)">
        <button id="btn-ejecutar" onclick="procesarOrden()">ENVIAR</button>
    </div>

    <script>
        const pantallaChat = document.getElementById('pantalla-chat');
        const entrada = document.getElementById('entrada');
        const btnMicro = document.getElementById('btn-micro');
        
        let reconocimiento;
        let grabando = false;

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            reconocimiento = new SpeechRecognition();
            reconocimiento.lang = 'es-ES';
            reconocimiento.onstart = () => { grabando = true; btnMicro.classList.add('grabando'); };
            reconocimiento.onend = () => { grabando = false; btnMicro.classList.remove('grabando'); };
            reconocimiento.onresult = (e) => { entrada.value = e.results[0][0].transcript; procesarOrden(); };
        }

        function alternarMicrofono() { if (reconocimiento) grabando ? reconocimiento.stop() : reconocimiento.start(); }
        function detectarEnter(e) { if (e.key === 'Enter') procesarOrden(); }

        function hablar(t) {
            if ('speechSynthesis' in window) {
                const m = new SpeechSynthesisUtterance(t);
                m.lang = 'es-ES';
                window.speechSynthesis.speak(m);
            }
        }

        async function procesarOrden() {
            const texto = entrada.value.trim();
            if (!texto) return;

            imprimirPantalla(texto, 'usuario-msg');
            entrada.value = '';

            try {
                const respuesta = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: texto })
                });

                const datos = await respuesta.json();

                if (datos.reply) {
                    imprimirPantalla(datos.reply, 'jarvis-msg');
                    hablar(datos.reply);
                } else {
                    imprimirPantalla("Error de respuesta en la matriz central.", 'jarvis-msg');
                }
            } catch (error) {
                imprimirPantalla("Error de enlace. Servidor fuera de línea.", 'jarvis-msg');
            }
        }

        function imprimirPantalla(mensaje, clase) {
            const burbuja = document.createElement('div');
            burbuja.className = `burbuja ${clase}`;
            burbuja.textContent = mensaje;
            pantallaChat.appendChild(burbuja);
            pantallaChat.scrollTop = pantallaChat.scrollHeight;
        }
    </script>
</body>
    </html>
