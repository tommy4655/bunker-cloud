<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>BÚNKER X9 // NÚCLEO AVANZADO</title>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <style>
        :root {
            --bg: #030206;
            --panel: rgba(10, 7, 20, 0.95);
            --border: #8be9fd;
            --cyan: #8be9fd;
            --magenta: #ff79c6;
            --green: #50fa7b;
            --text: #f8f8f2;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Courier New', monospace;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: var(--panel);
        }

        .title {
            font-size: 0.75em;
            color: var(--cyan);
            font-weight: bold;
            padding: 12px;
            text-transform: uppercase;
            border-bottom: 2px solid rgba(139, 233, 253, 0.2);
            background: rgba(139, 233, 253, 0.03);
            text-align: center;
        }
        
        .terminal-box {
            flex: 1;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            font-size: 0.85em;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        /* Esta regla es el secreto para que los códigos y textos se vean ordenados */
        .msg { 
            line-height: 1.5; 
            word-break: break-word; 
            white-space: pre-wrap; 
        }
        .msg.user { color: var(--magenta); font-weight: bold; }
        .msg.ia { color: var(--green); }
        
        .chat-input-row {
            display: flex;
            gap: 8px;
            padding: 12px;
            background: #0a0714;
            border-top: 2px solid rgba(139, 233, 253, 0.2);
            width: 100%;
            padding-bottom: env(safe-area-inset-bottom, 20px); 
        }

        input {
            flex: 1;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--border);
            color: #fff;
            padding: 12px;
            border-radius: 4px;
            font-family: inherit;
            outline: none;
            font-size: 0.95em;
        }

        button {
            background: var(--cyan);
            border: none;
            color: #000;
            padding: 0 20px;
            border-radius: 4px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="title">📡 COGNICIÓN EN LÍNEA // NÚCLEO DE CÓDIGO LLAMA-3</div>
        
        <div class="terminal-box" id="chat-box">
            <div class="msg ia">[SISTEMA]: Matriz de datos Llama 3 Instruct cargada. Compilador listo para scripts complejos. Introduce orden...</div>
        </div>
        
        <div class="chat-input-row">
            <input type="text" id="user-in" placeholder="Pídele un código o haz una consulta..." onkeypress="if(event.key==='Enter') enviarMensaje()">
            <button onclick="enviarMensaje()">RUN</button>
        </div>
    </div>

    <script {
        // (El script de envío se mantiene idéntico y funcional)
    }>
        async function enviarMensaje() {
            const input = document.getElementById('user-in');
            const txt = input.value.trim();
            if(!txt) return;

            const box = document.getElementById('chat-box');
            box.innerHTML += `<div class="msg user">> ${txt}</div>`;
            input.value = "";
            box.scrollTop = box.scrollHeight;

            box.innerHTML += `<div class="msg ia" id="loading">[PROCESANDO ALGORITMO...]</div>`;
            box.scrollTop = box.scrollHeight;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: txt })
                });
                const data = await response.json();
                
                const loadingEl = document.getElementById('loading');
                if (loadingEl) loadingEl.remove();
                
                box.innerHTML += `<div class="msg ia">[IA]: ${data.reply || 'Error en vector de respuesta.'}</div>`;
            } catch (e) {
                const loadingEl = document.getElementById('loading');
                if (loadingEl) loadingEl.remove();
                box.innerHTML += `<div class="msg ia">[SISTEMA]: Error crítico de enlace.</div>`;
            }
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
