<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sentinel Hub // IA Terminal 🛰️</title>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <style>
        :root {
            --bg: #05030a;
            --panel: rgba(13, 10, 28, 0.9);
            --border: rgba(139, 233, 253, 0.15);
            --cyan: #8be9fd;
            --magenta: #ff79c6;
            --green: #50fa7b;
            --text: #f8f8f2;
        }
        body {
            background-color: var(--bg); color: var(--text); font-family: 'Courier New', monospace;
            margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; box-sizing: border-box;
        }
        .container { width: 100%; max-width: 460px; display: flex; flex-direction: column; gap: 15px; }
        .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 15px; box-sizing: border-box; }
        .title { font-size: 0.8em; color: var(--cyan); font-weight: bold; margin-bottom: 10px; text-transform: uppercase; border-bottom: 1px dashed var(--border); padding-bottom: 5px; }
        
        /* TERMINAL DE CHAT */
        .terminal-box { height: 250px; overflow-y: auto; background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 6px; padding: 10px; font-size: 0.8em; display: flex; flex-direction: column; gap: 8px; }
        .msg { line-height: 1.3; }
        .msg.user { color: var(--magenta); }
        .msg.ia { color: var(--green); }
        .chat-input-row { display: flex; gap: 5px; margin-top: 5px; }
        input { flex: 1; background: rgba(0,0,0,0.6); border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 6px; font-family: inherit; outline: none; }
        button { background: var(--cyan); border: none; color: #000; padding: 10px 15px; border-radius: 6px; font-family: inherit; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="panel">
            <div class="title">📡 CONEXIÓN EN LA NUBE // COGNICIÓN SIN FILTROS</div>
            <div class="terminal-box" id="chat-box">
                <div class="msg ia">[SISTEMA]: Núcleo cuántico Llama-3 en línea. Terminal lista para interactuar...</div>
            </div>
            <div class="chat-input-row">
                <input type="text" id="user-in" placeholder="Escribe una orden o pregunta..." onkeypress="if(event.key==='Enter') enviarMensaje()">
                <button onclick="enviarMensaje()">RUN</button>
            </div>
        </div>
    </div>

    <script>
        async function enviarMensaje() {
            const input = document.getElementById('user-in');
            const txt = input.value.trim();
            if(!txt) return;

            const box = document.getElementById('chat-box');
            box.innerHTML += `<div class="msg user">> ${txt}</div>`;
            input.value = "";
            box.scrollTop = box.scrollHeight;

            box.innerHTML += `<div class="msg ia" id="loading">[PENSANDO...]</div>`;

            try {
                // Esto llamará a la función serverless que configuraremos en la nube
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: txt })
                });
                const data = await response.json();
                
                if (document.getElementById('loading')) document.getElementById('loading').remove();
                box.innerHTML += `<div class="msg ia">[IA]: ${data.reply || 'Error de procesamiento.'}</div>`;
            } catch (e) {
                if (document.getElementById('loading')) document.getElementById('loading').remove();
                box.innerHTML += `<div class="msg ia">[SISTEMA]: Error de enlace de datos.</div>`;
            }
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
