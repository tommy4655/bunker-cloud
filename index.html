<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>BÚNKER X9 // ASISTENTE J.A.R.V.I.S.</title>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <style>
        :root {
            --bg: #030206;
            --panel: rgba(10, 7, 20, 0.95);
            --border: #8be9fd;
            --cyan: #8be9fd;
            --magenta: #ff79c6;
            --green: #50fa7b;
            --text: #f8f8f2;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Courier New', monospace;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: var(--panel);
        }

        .title {
            font-size: 0.75em;
            color: var(--cyan);
            font-weight: bold;
            padding: 12px;
            text-transform: uppercase;
            border-bottom: 2px solid rgba(139, 233, 253, 0.2);
            background: rgba(139, 233, 253, 0.03);
            text-align: center;
        }
        
        .terminal-box {
            flex: 1;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            font-size: 0.85em;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        .msg { 
            line-height: 1.5; 
            word-break: break-word; 
            white-space: pre-wrap; 
        }
        .msg.user { color: var(--magenta); font-weight: bold; }
        .msg.ia { color: var(--green); }
        
        .chat-input-row {
            display: flex;
            gap: 6px;
            padding: 12px;
            background: #0a0714;
            border-top: 2px solid rgba(139, 233, 253, 0.2);
            width: 100%;
            padding-bottom: env(safe-area-inset-bottom, 20px); 
        }

        input {
            flex: 1;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--border);
            color: #fff;
            padding: 12px;
            border-radius: 4px;
            font-family: inherit;
            outline: none;
            font-size: 0.95em;
        }

        button {
            background: var(--cyan);
            border: none;
            color: #000;
            padding: 0 14px;
            border-radius: 4px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9em;
            text-transform: uppercase;
        }

        .btn-mic {
            background: #282a36;
            border: 1px solid var(--magenta);
            color: var(--magenta);
            font-size: 1.2em;
        }
        .btn-mic.recording {
            background: var(--magenta);
            color: #000;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="title">🤖 PROYECTO J.A.R.V.I.S. // CONTROL CENTRAL</div>
        
        <div class="terminal-box" id="chat-box">
            <div class="msg ia">[JARVIS]: Todos los sistemas principales se encuentran operativos, Señor. ¿En qué puedo colaborar con sus proyectos hoy?</div>
        </div>
        
        <div class="chat-input-row">
            <button class="btn-mic" id="mic-btn" onclick="activarMicrofono()">🎤</button>
            <input type="text" id="user-in" placeholder="Ordene, Señor..." onkeypress="if(event.key==='Enter') enviarMensaje()">
            <button onclick="enviarMensaje()">RUN</button>
        </div>
    </div>

    <script>
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'es-ES';
            recognition.interimResults = false;

            recognition.onresult = (event) => {
                const textoEscuchado = event.results[0][0].transcript;
                document.getElementById('user-in').value = textoEscuchado;
                detenerMicrofono();
                enviarMensaje();
            };

            recognition.onerror = () => { detenerMicrofono(); };
            recognition.onend = () => { detenerMicrofono(); };
        }

        function activarMicrofono() {
            if (!recognition) return;
            const btn = document.getElementById('mic-btn');
            if (btn.classList.contains('recording')) {
                recognition.stop();
            } else {
                btn.classList.add('recording');
                btn.innerText = "🛑";
                recognition.start();
            }
        }

        function detenerMicrofono() {
            const btn = document.getElementById('mic-btn');
            btn.classList.remove('recording');
            btn.innerText = "🎤";
        }

        // Sistema inteligente para buscar y calibrar la voz de Jarvis
        function hablar(texto) {
            if ('speechSynthesis' in window) {
                // Limpiar caracteres que no se deben leer
                let textoLimpio = texto.replace(/\[.*?\]/g, '').replace(/[*_`#]/g, '').trim();
                
                const utterance = new SpeechSynthesisUtterance(textoLimpio);
                
                // Conseguir voces instaladas en el celular
                const voices = window.speechSynthesis.getVoices();
                
                // Intentar buscar una voz en español que suene masculina o de Google básica
                let vozJarvis = voices.find(v => v.lang.includes('es') && (v.name.toLowerCase().includes('male') || v.name.toLowerCase().includes('hombre') || v.name.toLowerCase().includes('natural')));
                
                // Si no encuentra una explícitamente de hombre, agarra la primera en español disponible
                if (!vozJarvis) {
                    vozJarvis = voices.find(v => v.lang.includes('es'));
                }
                
                if (vozJarvis) utterance.voice = vozJarvis;
                
                utterance.lang = 'es-ES';
                utterance.rate = 1.05; // Velocidad de habla refinada
                utterance.pitch = 0.85; // Bajamos el tono para forzar una voz más grave/robótica
                
                window.speechSynthesis.speak(utterance);
            }
