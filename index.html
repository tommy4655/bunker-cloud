<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>BÚNKER X9 // CEREBRO CENTRAL</title>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <style>
        :root {
            --bg: #030206;
            --panel: rgba(10, 7, 20, 0.95);
            --border: #8be9fd;
            --cyan: #8be9fd;
            --magenta: #ff79c6;
            --green: #50fa7b;
            --text: #f8f8f2;
        }
        
        * { box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Contenedor principal que ocupa toda la pantalla del móvil */
        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--panel);
            border: 2px solid rgba(139, 233, 253, 0.2);
        }

        /* Encabezado Táctico */
        .title {
            font-size: 0.85em;
            color: var(--cyan);
            font-weight: bold;
            padding: 15px;
            text-transform: uppercase;
            border-bottom: 2px solid rgba(139, 233, 253, 0.2);
            letter-spacing: 1px;
            background: rgba(139, 233, 253, 0.03);
        }
        
        /* Terminal de Chat - Ocupa todo el espacio intermedio */
        .terminal-box {
            flex: 1;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            font-size: 0.9em;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        .msg { line-height: 1.4; word-break: break-word; }
        .msg.user { color: var(--magenta); font-weight: bold; }
        .msg.ia { color: var(--green); }
        
        /* Barra de Entrada de Comandos Inferior */
        .chat-input-row {
            display: flex;
            gap: 10px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.4);
            border-top: 1px solid rgba(139, 233, 253, 0.15);
        }

        input {
            flex: 1;
            background: rgba(5, 3, 10, 0.8);
            border: 1px solid rgba(139, 233, 253, 0.4);
            color: #fff;
            padding: 14px;
            border-radius: 4px;
            font-family: inherit;
            outline: none;
            font-size: 1em;
        }

        input:focus {
            border-color: var(--cyan);
            box-shadow: 0 0 8px rgba(139, 233, 253, 0.3);
        }

        button {
            background: var(--cyan);
            border: none;
            color: #000;
            padding: 0 25px;
            border-radius: 4px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9em;
            text-transform: uppercase;
            transition: all 0.2s ease;
        }

        button:active {
            background: var(--magenta);
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="title">📡 NÚCLEO KERNEL // COGNICIÓN EN LÍNEA SIN RESTRICCIONES</div>
        
        <div class="terminal-box" id="chat-box">
            <div class="msg ia">[SISTEMA]: Enlace cuántico establecido con OpenRouter Cloud. Inteligencia táctica operativa al 100%. Sin filtros de protocolo activos. Listo para recibir directivas.</div>
        </div>
        
        <div class="chat-input-row">
            <input type="text" id="user-in" placeholder="Escribe una orden al búnker..." onkeypress="if(event.key==='Enter') enviarMensaje()">
            <button onclick="enviarMensaje()">RUN</button>
        </div>
    </div>

    <script>
        async function enviarMensaje() {
            const input = document.getElementById('user-in');
            const txt = input.value.trim();
            if(!txt) return;

            const box = document.getElementById('chat-box');
            box.innerHTML += `<div class="msg user">> ${txt}</div>`;
            input.value = "";
            box.scrollTop = box.scrollHeight;

            box.innerHTML += `<div class="msg ia" id="loading">[PENSANDO...]</div>`;
            box.scrollTop = box.scrollHeight;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: txt })
                });
                const data = await response.json();
                
                const loadingEl = document.getElementById('loading');
                if (loadingEl) loadingEl.remove();
                
                box.innerHTML += `<div class="msg ia">[IA]: ${data.reply || 'Error en vector de respuesta.'}</div>`;
            } catch (e) {
                const loadingEl = document.getElementById('loading');
                if (loadingEl) loadingEl.remove();
                box.innerHTML += `<div class="msg ia">[SISTEMA]: Error crítico en el canal de datos.</div>`;
            }
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
